<!DOCTYPE html>
<html>
<head>
    <title>Test Date Conversion</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Test Jalali Date Conversion</h1>
    <div id="output"></div>

    <script>
        function gregorianToJalali(gregorianDate) {
            let gy = gregorianDate.getFullYear();
            const gm = gregorianDate.getMonth() + 1;
            const gd = gregorianDate.getDate();

            const g_d_m = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 334];
            
            let jy;
            if (gy > 1600) {
                jy = 979;
                gy -= 1600;
            } else {
                jy = 0;
                gy -= 621;
            }

            const gy2 = (gm > 2) ? (gy + 1) : gy;
            let days = (365 * gy) + (Math.floor((gy2 + 3) / 4)) - (Math.floor((gy2 + 99) / 100)) + 
                       (Math.floor((gy2 + 399) / 400)) - 80 + gd + g_d_m[gm - 1];
            
            jy += 33 * Math.floor(days / 12053);
            days %= 12053;
            jy += 4 * Math.floor(days / 1461);
            days %= 1461;

            if (days > 365) {
                jy += Math.floor((days - 1) / 365);
                days = (days - 1) % 365;
            }

            let jm;
            let jd;
            
            if (days < 186) {
                jm = 1 + Math.floor(days / 31);
                jd = 1 + (days % 31);
            } else {
                jm = 7 + Math.floor((days - 186) / 30);
                jd = 1 + ((days - 186) % 30);
            }

            return { year: jy, month: jm, day: jd };
        }

        const output = document.getElementById('output');
        
        // Test today's date (23 Feb 2026)
        const today = new Date(2026, 1, 23); // Month is 0-indexed
        const jalaliToday = gregorianToJalali(today);
        output.innerHTML += `<p><strong>Today (23 Feb 2026):</strong> ${jalaliToday.year}/${jalaliToday.month}/${jalaliToday.day}</p>`;
        
        // Test 22 Dec 2025 (should be 2 Dey 1404)
        const dec22 = new Date(2025, 11, 22);
        const jalaliDec22 = gregorianToJalali(dec22);
        output.innerHTML += `<p><strong>22 Dec 2025:</strong> ${jalaliDec22.year}/${jalaliDec22.month}/${jalaliDec22.day}</p>`;
        
        // Test 23 Dec 2025 (should be 3 Dey 1404)
        const dec23 = new Date(2025, 11, 23);
        const jalaliDec23 = gregorianToJalali(dec23);
        output.innerHTML += `<p><strong>23 Dec 2025:</strong> ${jalaliDec23.year}/${jalaliDec23.month}/${jalaliDec23.day}</p>`;
        
        // Test 24 Dec 2025 (should be 4 Dey 1404)
        const dec24 = new Date(2025, 11, 24);
        const jalaliDec24 = gregorianToJalali(dec24);
        output.innerHTML += `<p><strong>24 Dec 2025:</strong> ${jalaliDec24.year}/${jalaliDec24.month}/${jalaliDec24.day}</p>`;
        
        // Test 20 Feb 2026 (should be 1 Esfand 1404)
        const feb20 = new Date(2026, 1, 20);
        const jalaliFeb20 = gregorianToJalali(feb20);
        output.innerHTML += `<p><strong>20 Feb 2026:</strong> ${jalaliFeb20.year}/${jalaliFeb20.month}/${jalaliFeb20.day}</p>`;
        
        // Test 21 Feb 2026 (should be 2 Esfand 1404)
        const feb21 = new Date(2026, 1, 21);
        const jalaliFeb21 = gregorianToJalali(feb21);
        output.innerHTML += `<p><strong>21 Feb 2026:</strong> ${jalaliFeb21.year}/${jalaliFeb21.month}/${jalaliFeb21.day}</p>`;
    </script>
</body>
</html>
