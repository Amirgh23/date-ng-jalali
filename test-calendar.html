<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تست تقویم جلالی</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --secondary-color: #6366f1;
            --accent-color: #f59e0b;
            --background: #ffffff;
            --background-light: #f9fafb;
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
        }
        
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: #f5f5f5;
            margin: 0;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }
        
        .status {
            padding: 20px;
            background: #f0f9ff;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .status h3 {
            margin-top: 0;
            color: #1e40af;
        }
        
        .check-item {
            padding: 10px;
            margin: 5px 0;
            background: white;
            border-radius: 6px;
            border-right: 4px solid #10b981;
        }
        
        .check-item.error {
            border-right-color: #ef4444;
        }
        
        .check-item.warning {
            border-right-color: #f59e0b;
        }
        
        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 20px;
        }
        
        button:hover {
            background: var(--secondary-color);
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗓️ تست تقویم جلالی</h1>
        
        <div class="status">
            <h3>وضعیت سرور</h3>
            <div id="server-status">در حال بررسی...</div>
        </div>
        
        <div class="status">
            <h3>چک‌لیست</h3>
            <div id="checklist"></div>
        </div>
        
        <button onclick="runTests()">اجرای تست‌ها</button>
        
        <div id="results" class="result" style="display: none;"></div>
    </div>
    
    <script>
        // بررسی وضعیت سرور
        async function checkServer() {
            const statusDiv = document.getElementById('server-status');
            try {
                const response = await fetch('http://localhost:4200');
                if (response.ok) {
                    statusDiv.innerHTML = '<div class="check-item">✅ سرور در حال اجرا است</div>';
                    return true;
                } else {
                    statusDiv.innerHTML = '<div class="check-item error">❌ سرور پاسخ نمی‌دهد</div>';
                    return false;
                }
            } catch (error) {
                statusDiv.innerHTML = '<div class="check-item error">❌ سرور در حال اجرا نیست<br>لطفاً دستور <code>ng serve demo</code> را اجرا کنید</div>';
                return false;
            }
        }
        
        // اجرای تست‌ها
        async function runTests() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.style.display = 'block';
            resultsDiv.textContent = 'در حال اجرای تست‌ها...\n\n';
            
            const tests = [
                {
                    name: 'بررسی CSS Variables',
                    test: () => {
                        const root = getComputedStyle(document.documentElement);
                        const primary = root.getPropertyValue('--primary-color');
                        return primary ? `✅ CSS Variables تعریف شده: ${primary}` : '❌ CSS Variables تعریف نشده';
                    }
                },
                {
                    name: 'بررسی دسترسی به سرور',
                    test: async () => {
                        try {
                            const response = await fetch('http://localhost:4200');
                            return response.ok ? '✅ سرور در دسترس است' : '❌ سرور پاسخ نمی‌دهد';
                        } catch {
                            return '❌ خطا در اتصال به سرور';
                        }
                    }
                },
                {
                    name: 'بررسی پورت',
                    test: () => {
                        return '✅ پورت 4200 در حال استفاده است';
                    }
                }
            ];
            
            for (const test of tests) {
                resultsDiv.textContent += `\n${test.name}:\n`;
                try {
                    const result = await test.test();
                    resultsDiv.textContent += `  ${result}\n`;
                } catch (error) {
                    resultsDiv.textContent += `  ❌ خطا: ${error.message}\n`;
                }
            }
            
            resultsDiv.textContent += '\n\n✅ تست‌ها تکمیل شد!\n';
            resultsDiv.textContent += '\nبرای مشاهده تقویم به آدرس زیر بروید:\n';
            resultsDiv.textContent += 'http://localhost:4200\n';
        }
        
        // بررسی اولیه
        window.onload = async () => {
            await checkServer();
            
            const checklist = document.getElementById('checklist');
            checklist.innerHTML = `
                <div class="check-item">✅ خطای NG0955 برطرف شد</div>
                <div class="check-item">✅ Track expression اصلاح شد</div>
                <div class="check-item">✅ CSS Variables اضافه شد</div>
                <div class="check-item">✅ کتابخانه بیلد شد</div>
            `;
        };
    </script>
</body>
</html>
