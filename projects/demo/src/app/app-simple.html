<div style="padding: 40px; max-width: 600px; margin: 0 auto; font-family: Arial, sans-serif;">
  <h1 style="text-align: center; color: #3b82f6;">🗓️ تقویم جلالی</h1>
  
  <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
    <jalali-date-picker
      [selectedDate]="selectedDate"
      (dateSelect)="onDateSelect($event)">
    </jalali-date-picker>
  </div>
  
  <div style="margin-top: 30px; padding: 20px; background: #f0f9ff; border-radius: 12px;">
    <h3 style="margin-top: 0; color: #1e40af;">تاریخ انتخاب شده:</h3>
    <p style="font-size: 18px; color: #3b82f6; font-weight: bold;">
      {{ selectedDate | date: 'yyyy-MM-dd' }}
    </p>
  </div>
</div>
